<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07162d" />
  <title>Ịmaya Interactive Visualizer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header>
      <h1>Ịmaya Visualizer</h1>
      <p>Drag the magic orb. Hold arrow keys for fluid body movement. Hold Shift to boost.</p>
    </header>

    <canvas id="stage" aria-label="Interactive Ịmaya character visualizer"></canvas>

    <section class="scene-panel" id="scenePanel" aria-label="Cinematic actions">
      <button class="scene-card" data-scene="awaken"><strong>1 · Awaken</strong><span>Boot sequence and first pulse</span></button>
      <button class="scene-card" data-scene="scan"><strong>2 · Scan</strong><span>Energy reading and diagnosis</span></button>
      <button class="scene-card" data-scene="teach"><strong>3 · Teach</strong><span>Visual explanation sequence</span></button>
      <button class="scene-card" data-scene="jump"><strong>4 · Portal Jump</strong><span>Warp across the field</span></button>
      <button class="scene-card" data-scene="build"><strong>5 · Build Spell</strong><span>Draw and construct a star</span></button>
      <button class="scene-card" data-scene="guard"><strong>6 · Guardian</strong><span>Shield rings and lightning</span></button>
      <button class="scene-card" data-scene="heal"><strong>7 · Heal Aura</strong><span>Warm color and levitation</span></button>
      <button class="scene-card" data-scene="celebrate"><strong>8 · Celebrate</strong><span>Clones, sparks and starburst</span></button>
    </section>

    <section class="controls" id="controls" aria-label="Manual effects">
      <button data-mode="idle">0 Idle</button>
      <button data-mode="glow">Q Glow</button>
      <button data-mode="portal">W Portal</button>
      <button data-mode="bloom">E Bloom</button>
      <button data-mode="clone">R Clones</button>
      <button data-mode="trail">T Trail</button>
      <button data-mode="speak">Y Speak</button>
      <button data-mode="color">U Color</button>
      <button data-mode="levitate">I Levitate</button>
      <button data-mode="storm">O Storm</button>
      <button data-mode="star">P Star</button>
      <button data-mode="orbit">Orbit</button>
    </section>
  </main>

  <div id="status" role="status" aria-live="polite">Ready.</div>

  <aside id="keyGuide" aria-label="Keyboard guide">
    <b>Keyboard controls</b>
    <div class="key-grid">
      <div><kbd>1–8</kbd><span>Scenes</span></div>
      <div><kbd>Q–P</kbd><span>Effects</span></div>
      <div><kbd>←↑↓→</kbd><span>Hold to move</span></div>
      <div><kbd>Shift</kbd><span>Speed boost</span></div>
      <div><kbd>0</kbd><span>Idle</span></div>
      <div><kbd>H</kbd><span>Hide guide</span></div>
    </div>
  </aside>

  <script src="app.js" defer></script>
</body>
</html>
